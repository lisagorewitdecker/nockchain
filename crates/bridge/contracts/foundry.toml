[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"

# Enable build info for Tenderly integration
build_info = true
build_info_path = "out/build-info"

# Enhanced settings for Tenderly
extra_output = ["storageLayout", "metadata"]
extra_output_files = ["metadata"]

# Tenderly simulation settings
gas_reports = ["*"]

# Optimizer settings for better analysis
optimizer = true
optimizer_runs = 200
via-ir = true

# Required for Tenderly contract verification
cbor_metadata = true

# Filesystem access for deployment scripts
fs_permissions = [
  { access = "read-write", path = "./" },
  { access = "read-write", path = "./deployments.json" },
]
